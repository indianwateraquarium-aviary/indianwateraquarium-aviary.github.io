<!DOCTYPE html>
<html>
<head>
    <title>Indian Waters Aquarium and Aviary</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f2f6f9;
        }

        header {
            background: linear-gradient(to right, #0077b6, #00b4d8);
            color: white;
            text-align: center;
            padding: 25px;
        }

        h1 {
            margin: 0;
        }

        section {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .buttons a {
            display: inline-block;
            margin: 10px 10px 0 0;
            padding: 12px 18px;
            background: #023e8a;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .buttons a:hover {
            background: #0077b6;
        }

        .gallery img {
            width: 150px;
            margin: 10px;
            border-radius: 8px;
        }

        footer {
            background: #03045e;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>Indian Waters Aquarium and Aviary 🐠🐦</h1>
    <p>Sharing my journey with fish and birds</p>
</header>

<section>

    <div class="card">
        <h2>Follow Me</h2>

        <div class="buttons">
            <a href="https://instagram.com/YOURUSERNAME" target="_blank">Instagram</a>
            <a href="https://youtube.com/YOURCHANNEL" target="_blank">YouTube</a>
            <a href="https://facebook.com/YOURPAGE" target="_blank">Facebook</a>
        </div>
    </div>

    <div class="card">
        <h2>Gallery</h2>
        <div class="gallery">
            <img src="image1.jpg" alt="Gallery Image">
            <img src="image2.jpg" alt="Gallery Image">
            <img src="image3.jpg" alt="Gallery Image">
        </div>
        <p>Upload your own fish & bird photos here</p>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>Email: yourname@email.com</p>
        <p>Instagram DM is preferred for quick response</p>
    </div>

</section>

<footer>
    <p>© 2026 Indian Waters Aquarium and Aviary</p>
</footer>

</body>
</html>
